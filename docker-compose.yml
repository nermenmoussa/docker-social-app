version: '3.8'

services:

frontend:
    image: nermenmoussa/social-frontend:1.0
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://backend:5000/api
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:5000/api
    networks:
      - frontend
    depends_on:
      - backend

backend:
    image: nermenmoussa/social-backend:1.0
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=mongodb://mongo:27017/socialapp
      - JWT_SECRET=mysecretkey123
      - PORT=5000
    networks:
      - frontend
      - backend
    depends_on:
      - mongo

mongo:
    image: mongo:latest
    volumes:
      - mongo-data:/data/db
    networks:
      - backend

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge

volumes:
  mongo-data: