version: '3.8'

services:

  # ── Frontend (Next.js) ─────────────────────
  frontend:
    image: YOUR_DOCKERHUB_USERNAME/social-frontend:1.0
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:5000/api
    networks:
      - frontend
    depends_on:
      - backend

  # ── Backend (Node.js) ──────────────────────
  backend:
    image: YOUR_DOCKERHUB_USERNAME/social-backend:1.0
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=mongodb://mongo:27017/socialapp
      - JWT_SECRET=mysecretkey123
      - PORT=5000
    networks:
      - frontend
      - backend
    depends_on:
      - mongo

  # ── Database (MongoDB) ─────────────────────
  mongo:
    image: mongo:latest
    volumes:
      - mongo-data:/data/db
    networks:
      - backend

# ── Networks ───────────────────────────────
networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge

# ── Volumes ────────────────────────────────
volumes:
  mongo-data:
